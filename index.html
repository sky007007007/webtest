<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轻量数据收集 · CSV 记事本</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #f6f9fc 0%, #e9f1f8 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
            width: 100%;
            max-width: 800px;
            border-radius: 32px;
            box-shadow: 0 25px 40px -12px rgba(0,20,40,0.35),
                        0 2px 8px rgba(0,0,0,0.05);
            padding: 28px 30px 36px;
            border: 1px solid rgba(255,255,255,0.6);
            transition: all 0.2s ease;
        }
        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin: 0 0 8px 0;
            color: #0b2b3b;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        h1 span {
            background: #1d5e7c;
            color: white;
            font-size: 0.9rem;
            font-weight: 400;
            padding: 4px 14px;
            border-radius: 40px;
            letter-spacing: 0.3px;
        }
        .sub {
            color: #2c4b5e;
            margin: 4px 0 24px 0;
            font-size: 1rem;
            border-left: 4px solid #5fa3c4;
            padding-left: 16px;
            background: #e0edf5a0;
            border-radius: 0 20px 20px 0;
            line-height: 1.5;
        }
        .collector-grid {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }
        /* 表单区域 */
        .form-section {
            background: #ffffffd9;
            border-radius: 28px;
            padding: 24px 26px;
            box-shadow: inset 0 1px 3px #ffffff, 0 10px 18px -12px #1f3c4d;
            border: 1px solid rgba(255,255,255,0.8);
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
        }
        .input-group {
            flex: 1 1 180px;
            min-width: 0;
        }
        .input-group label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            color: #1d5a7a;
            margin-bottom: 4px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #cbdde9;
            border-radius: 20px;
            font-size: 1rem;
            background: white;
            transition: 0.15s;
            outline: none;
            color: #0b2b3b;
        }
        .input-group input:focus {
            border-color: #2b8cb0;
            box-shadow: 0 0 0 4px #b3dff580;
        }
        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            margin-top: 8px;
        }
        .btn {
            border: none;
            background: white;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 550;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 30, 50, 0.08);
            transition: all 0.15s;
            border: 1px solid transparent;
        }
        .btn-primary {
            background: #166b89;
            color: white;
            box-shadow: 0 8px 18px -8px #0f4b61;
            flex: 1 1 auto;
        }
        .btn-primary:hover {
            background: #1d7fa1;
            transform: scale(1.02);
            box-shadow: 0 12px 22px -10px #1f637e;
        }
        .btn-secondary {
            background: #eaf1f7;
            color: #144a5e;
            border: 1px solid #b7d3e5;
        }
        .btn-secondary:hover {
            background: #dde9f2;
            border-color: #80b6d6;
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #7a9eb3;
            color: #1e4f65;
            box-shadow: none;
            padding: 8px 20px;
        }
        .btn-outline:hover {
            background: #ffffffb5;
            border-color: #166b89;
        }
        .btn:active {
            transform: translateY(1px);
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        /* 表格区 (CSV 预览) */
        .db-section {
            background: #ffffffd0;
            border-radius: 24px;
            padding: 4px 4px 4px 18px;
            border: 1px solid #bdd8e9;
            display: flex;
            flex-direction: column;
        }
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 16px 8px 8px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .table-header h3 {
            margin: 0;
            font-weight: 550;
            color: #134252;
            font-size: 1.35rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .badge {
            background: #568ca7;
            color: white;
            border-radius: 28px;
            padding: 2px 12px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .csv-actions {
            display: flex;
            gap: 8px;
        }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
            background: #ffffff;
            margin: 8px 0 8px 0;
            border: 1px solid #cbe0eb;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
            min-width: 400px;
        }
        th {
            background: #daeaf3;
            color: #0e3a4b;
            font-weight: 600;
            padding: 14px 12px;
            text-align: left;
            border-bottom: 2px solid #aaccdf;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #cde0ea;
            color: #1a475a;
        }
        tr:last-child td {
            border-bottom: none;
        }
        .empty-message td {
            padding: 30px;
            text-align: center;
            color: #6f92a5;
            font-style: italic;
            background: #f6fafd;
        }
        .footer-note {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 14px 6px 8px;
            font-size: 0.85rem;
            color: #316277;
            flex-wrap: wrap;
            gap: 8px;
        }
        .download-btn {
            background: #f0f6fb;
            border: 1px solid #9fbdd1;
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 0.9rem;
            color: #074153;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .download-btn:hover {
            background: #dbeaf3;
            border-color: #558aa8;
        }
        .clear-btn {
            background: none;
            border: none;
            color: #9b5e5e;
            text-decoration: underline dotted;
            font-size: 0.8rem;
            cursor: pointer;
            padding: 6px 10px;
            opacity: 0.7;
        }
        .clear-btn:hover {
            opacity: 1;
            color: #b13e3e;
        }
        hr {
            border: none;
            border-top: 1.5px dashed #aec9db;
            margin: 12px 0 8px;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>
        📋 简易数据收集器
        <span>csv 数据库</span>
    </h1>
    <div class="sub">👇 输入信息 → 保存 → 预览/导出 .csv 文件 (所有数据保留在浏览器中)</div>

    <div class="collector-grid">
        <!-- 输入表单 -->
        <div class="form-section">
            <div class="form-row">
                <div class="input-group">
                    <label>👤 姓名</label>
                    <input type="text" id="inputName" placeholder="例如：张明" autocomplete="off">
                </div>
                <div class="input-group">
                    <label>📅 年龄</label>
                    <input type="number" id="inputAge" placeholder="18-99" min="1" max="120" step="1">
                </div>
                <div class="input-group">
                    <label>📧 邮箱</label>
                    <input type="email" id="inputEmail" placeholder="name@example.com" autocomplete="off">
                </div>
            </div>
            <div class="button-group">
                <button class="btn btn-primary" id="addBtn">➕ 保存这条记录</button>
                <button class="btn btn-secondary" id="quickFillBtn">🎲 填入示例</button>
            </div>
        </div>

        <!-- CSV 数据库预览 + 操作 -->
        <div class="db-section">
            <div class="table-header">
                <h3>
                    🗂️ 当前记录 · CSV 数据
                    <span class="badge" id="rowCount">0 行</span>
                </h3>
                <div class="csv-actions">
                    <button class="download-btn" id="downloadCsvBtn" title="下载为 data.csv">📥 下载 CSV</button>
                </div>
            </div>

            <div class="table-wrapper">
                <table id="dataTable">
                    <thead>
                        <tr><th>姓名</th><th>年龄</th><th>邮箱</th></tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- 动态生成行 -->
                        <tr class="empty-message"><td colspan="3">✨ 还没有数据，填写上方表单添加一条记录</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="footer-note">
                <span>📌 共 <span id="recordCountSpan">0</span> 条记录 (内存数据库)</span>
                <button class="clear-btn" id="clearAllBtn" title="清空所有数据">🧹 清空全部</button>
            </div>
        </div>
    </div>
    <hr>
    <div style="font-size:0.8rem; color:#598296; display:flex; gap:16px; justify-content:flex-end;">
        <span>💾 数据以 CSV 格式保存在浏览器内存中</span>
        <span>⚡ 刷新页面即重置 (可下载备份)</span>
    </div>
</div>

<script>
    (function() {
        // ---------- 内存数据库 (模拟csv) ----------
        // 每个对象: { name, age, email }
        let localDB = [];

        // 获取DOM元素
        const nameInput = document.getElementById('inputName');
        const ageInput = document.getElementById('inputAge');
        const emailInput = document.getElementById('inputEmail');
        const addBtn = document.getElementById('addBtn');
        const quickFillBtn = document.getElementById('quickFillBtn');
        const downloadBtn = document.getElementById('downloadCsvBtn');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const tableBody = document.getElementById('tableBody');
        const rowCountSpan = document.getElementById('rowCount');
        const recordCountSpan = document.getElementById('recordCountSpan');

        // 辅助函数: 更新表格UI + 计数显示
        function renderTable() {
            const tbody = tableBody;
            const rows = localDB;

            if (rows.length === 0) {
                tbody.innerHTML = `<tr class="empty-message"><td colspan="3">✨ 还没有数据，填写上方表单添加一条记录</td></tr>`;
                rowCountSpan.innerText = '0 行';
                recordCountSpan.innerText = '0';
                return;
            }

            // 构建表格行
            let htmlStr = '';
            rows.forEach(item => {
                // 防止显示 undefined 或 null
                const name = item.name || '';
                const age = item.age || '';
                const email = item.email || '';
                htmlStr += `<tr><td>${escapeHtml(name)}</td><td>${escapeHtml(age)}</td><td>${escapeHtml(email)}</td></tr>`;
            });
            tbody.innerHTML = htmlStr;

            // 更新计数
            const count = rows.length;
            rowCountSpan.innerText = count + ' 行' + (count > 1 ? '' : '');
            recordCountSpan.innerText = count;
        }

        // 简单转义防止XSS (尽管数据安全，但习惯)
        function escapeHtml(unsafe) {
            if (unsafe === undefined || unsafe === null) return '';
            return String(unsafe)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // 验证一行数据 (简单校验)
        function isValidEntry(name, age, email) {
            if (!name || name.trim() === '') return false;
            // 年龄: 必须是数字，且1-120之间 (允许为空? 这里要求必须填数字)
            const ageNum = parseInt(age, 10);
            if (isNaN(ageNum) || ageNum < 1 || ageNum > 120) return false;
            // 邮箱: 简单判断包含@和点 (不进行极端复杂校验)
            if (!email || !email.includes('@') || !email.includes('.') || email.trim() === '') return false;
            return true;
        }

        // 从inputs获取 trimmed 值
        function getInputValues() {
            return {
                name: nameInput.value.trim(),
                age: ageInput.value.trim(),
                email: emailInput.value.trim()
            };
        }

        // 清空输入框
        function clearInputs() {
            nameInput.value = '';
            ageInput.value = '';
            emailInput.value = '';
        }

        // 添加新数据
        function addEntryFromInputs() {
            const { name, age, email } = getInputValues();

            if (!isValidEntry(name, age, email)) {
                alert('请填写完整且合法的信息：姓名不能为空，年龄1-120的数字，有效的邮箱(包含@和.)');
                return false;
            }

            // 存入内存数据库 (年龄保存为字符串但没关系，符合csv)
            localDB.push({
                name: name,
                age: age,
                email: email
            });

            renderTable();
            clearInputs();        // 方便连续录入
            return true;
        }

        // 填入示例/随机数据 (快速填充)
        function fillExample() {
            const examples = [
                { name: '王芳', age: '28', email: 'wang.fang@example.com' },
                { name: '陈思远', age: '34', email: 'siyuan.chen@work.com' },
                { name: '李雷', age: '24', email: 'lilei@school.edu' },
                { name: '韩梅梅', age: '23', email: 'meimei.han@company.cn' },
                { name: '赵一鸣', age: '45', email: 'zhao.ym@test.org' }
            ];
            const rand = examples[Math.floor(Math.random() * examples.length)];
            nameInput.value = rand.name;
            ageInput.value = rand.age;
            emailInput.value = rand.email;
        }

        // 导出CSV文件 (包含表头)
        function downloadCSV() {
            if (localDB.length === 0) {
                alert('暂无数据，无法下载 CSV。');
                return;
            }

            // 定义列名
            const headers = ['姓名', '年龄', '邮箱'];
            // 将数据转换成二维数组
            const rows = localDB.map(item => [
                // 处理可能的逗号/换行符：简单用双引号包裹，并替换内部引号 (基础CSV转义)
                sanitizeCSVField(item.name || ''),
                sanitizeCSVField(item.age || ''),
                sanitizeCSVField(item.email || '')
            ]);

            // 构建CSV内容：头部 + 行
            let csvContent = headers.map(h => `"${h}"`).join(',') + '\n';   // 头部也加引号但无关紧要
            rows.forEach(row => {
                csvContent += row.join(',') + '\n';
            });

            // 创建blob下载
            const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' }); // 加BOM使excel打开不乱码
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.setAttribute('download', 'data_collection.csv');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        // 简单CSV字段转义：包裹双引号，并将内部双引号替换为两个双引号
        function sanitizeCSVField(field) {
            if (field === null || field === undefined) field = '';
            let str = String(field);
            // 如果包含逗号、双引号或换行，用双引号包裹，并将内部双引号替换为 ""
            if (str.includes(',') || str.includes('"') || str.includes('\n') || str.includes('\r')) {
                str = str.replace(/"/g, '""');   // 双引号转义
                return `"${str}"`;
            }
            return `"${str}"`;   // 统一加双引号使字段清晰 (也可不加，这里统一加比较规范)
        }

        // 清空全部数据
        function clearAllData() {
            if (localDB.length === 0) return;
            if (confirm('确定要清空所有收集的数据吗？')) {
                localDB = [];
                renderTable();
                // 可选同时清空输入框
                clearInputs();
            }
        }

        // ---------- 绑定事件 ----------
        addBtn.addEventListener('click', function(e) {
            e.preventDefault();
            addEntryFromInputs();
        });

        // 回车快捷保存 (在任意输入框按回车触发保存)
        [nameInput, ageInput, emailInput].forEach(input => {
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();  // 防止某些浏览器的怪异提交
                    addEntryFromInputs();
                }
            });
        });

        quickFillBtn.addEventListener('click', function(e) {
            e.preventDefault();
            fillExample();
        });

        downloadBtn.addEventListener('click', function(e) {
            e.preventDefault();
            downloadCSV();
        });

        clearAllBtn.addEventListener('click', function(e) {
            e.preventDefault();
            clearAllData();
        });

        // 初始化渲染 (空数据)
        renderTable();

        // 额外：想保留一点初始示例数据? 不加，保持干净。但为了直观可以加两条演示，也可以不加。我们留空以展示“无数据”状态。
        // 但为了初次体验，提供一条演示数据吧(注释掉)。为了简洁，决定不加初始数据，让用户自己添加。
        // 如果想添加演示，取消下面注释:
        /*
        localDB.push({ name: '演示用户', age: '32', email: 'demo@sample.org' });
        renderTable();
        */
    })();
</script>
</body>
</html>
