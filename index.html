<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大字版 · 树莓派小驴车群 · 动态相迎</title>
    <style>
        /* 全局大字设置：基础放大 1.3 倍，关键元素用 rem/em 强化 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #3a4e5e 0%, #1e3a4a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Noto Sans SC', Roboto, 'Helvetica Neue', sans-serif;
            padding: 1.2rem;
            transition: background 0.25s ease;
            font-size: 20px; /* 基准字体调大，后面rem都基于此 */
        }

        /* 大卡片 —— 更大更宽松 */
        .dynamic-card {
            max-width: 1100px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 3.5rem;
            padding: 3.5rem 3rem;
            box-shadow: 0 40px 70px rgba(0, 0, 0, 0.4), 0 0 0 2px rgba(255, 215, 140, 0.5) inset, 0 15px 30px -10px #00000060;
            border: 2px solid #ffefc0;
            transition: box-shadow 0.3s, background-color 0.3s;
        }

        /* 超大群问候 —— 重点突出“树莓派小驴车群” */
        .greeting {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2.8rem;
            text-align: center;
        }

        .greeting h1 {
            font-size: 4.2rem;        /* 巨大字号 */
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(145deg, #2b4d2b, #2f664a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.3;
            text-shadow: 4px 4px 12px rgba(180, 210, 160, 0.6);
            word-break: break-word;
        }

        .greeting h1 span {
            background: #efe6c6;
            padding: 0.2rem 1.2rem;
            border-radius: 100px;
            font-size: 3rem;
            color: #1d4d1d;
            display: inline-block;
            margin-top: 0.8rem;
            border: 3px solid #ffeeaa;
            box-shadow: 0 10px 20px #00000020;
        }

        .live-badge {
            background: #fedb9f;
            color: #1e4a2e;
            padding: 0.8rem 2.2rem;
            border-radius: 80px;
            font-size: 2rem;           /* 明显大字号 */
            font-weight: 700;
            border: 2px solid #fff9e6;
            box-shadow: 0 8px 16px #0f2f1a40;
            backdrop-filter: blur(8px);
            display: inline-flex;
            align-items: center;
            gap: 15px;
            margin-top: 1.2rem;
        }

        .live-badge::before {
            content: "";
            width: 24px;
            height: 24px;
            background: #66ff99;
            border-radius: 50%;
            box-shadow: 0 0 20px #88ff88;
            animation: pulse-green 1.6s infinite;
        }

        @keyframes pulse-green {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.3); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* 时间板块 —— 字要大！ */
        .time-panel {
            background: #ffffffd9;
            border-radius: 3rem;
            padding: 2.5rem 2.8rem;
            margin-bottom: 3.2rem;
            border: 2px solid #ffffff;
            box-shadow: 0 15px 30px -10px #002635;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 2rem;
        }

        .time-place {
            display: flex;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .clock-icon {
            font-size: 4rem;           /* 大时钟图标 */
            filter: drop-shadow(4px 6px 6px #00000030);
        }

        .digital {
            font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
            font-size: 3.4rem;          /* 超大半数字 */
            font-weight: 600;
            background: #172f3c;
            color: #ddf4ff;
            padding: 0.8rem 2rem;
            border-radius: 70px;
            letter-spacing: 6px;
            box-shadow: inset 0 -5px 0 #2a506b;
            border: 2px solid #85b9e6;
        }

        .date-tag {
            background: #f5efe2;
            padding: 1rem 2.5rem;
            border-radius: 70px;
            color: #113e2f;
            font-weight: 700;
            font-size: 2rem;            /* 大日期 */
            border: 2px solid white;
            box-shadow: 0 5px 15px #a1b9cf;
            white-space: nowrap;
        }

        /* 鼠标互动区 —— 大字醒目 */
        .surprise-zone {
            background: rgba(245, 240, 230, 0.7);
            border-radius: 3rem;
            padding: 2.5rem 2rem;
            margin-bottom: 3rem;
            border: 4px dashed #c0a56b;
            transition: background-color 0.2s, border-color 0.2s;
            cursor: crosshair;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .surprise-zone p {
            font-size: 2.3rem;          /* 大提示 */
            font-weight: 600;
            color: #2e4a33;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 1.2rem;
        }

        .mouse-coord {
            font-family: 'JetBrains Mono', monospace;
            background: #1d4635;
            color: #f6ffe0;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            font-size: 2rem;            /* 大坐标 */
            border: 2px solid #dab066;
            box-shadow: 0 5px 0 #0b281f;
        }

        .fun-message {
            margin-top: 1.5rem;
            font-size: 2.4rem;          /* 超大会变消息 */
            font-weight: 550;
            font-style: italic;
            color: #253d2e;
            background: #ffffffd9;
            padding: 1.2rem 2.4rem;
            border-radius: 80px;
            display: inline-block;
            backdrop-filter: blur(6px);
            border: 2px solid #fff3c9;
            box-shadow: 0 10px 20px #0000001a;
        }

        /* 工具条按钮 —— 大而好点 */
        .toolbar {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
            margin: 2rem 0 1.5rem;
        }

        .dyn-btn {
            background: #fcf6e9;
            border: none;
            border-radius: 80px;
            padding: 1.4rem 3rem;
            font-size: 2rem;             /* 大字按钮 */
            font-weight: 650;
            color: #1e4d34;
            backdrop-filter: blur(6px);
            box-shadow: 0 10px 20px #00000030, 0 2px 4px #ffffff inset;
            border: 2px solid #fffff0;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 20px;
        }

        .dyn-btn:hover {
            background: #ffffff;
            box-shadow: 0 18px 30px -8px #0e4620;
            transform: translateY(-4px);
            border-color: #ffdb9f;
        }

        .dyn-btn:active {
            transform: translateY(4px);
            box-shadow: 0 6px 12px #00000040;
        }

        .color-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: conic-gradient(#f6f, #ffb347, #6cf, #cf9eff);
            border: 2px solid white;
        }

        footer {
            margin-top: 2.8rem;
            text-align: center;
            font-size: 1.7rem;          /* footer大字 */
            color: #ccdbe9;
            border-top: 2px solid #e7d8b8;
            padding-top: 2rem;
            font-weight: 600;
            text-shadow: 2px 2px 0 #0d2f1f;
        }

        /* 手机等小屏适配 —— 保证大字不爆框 */
        @media (max-width: 700px) {
            body { font-size: 16px; }
            .greeting h1 { font-size: 3rem; }
            .greeting h1 span { font-size: 2.2rem; }
            .digital { font-size: 2.4rem; letter-spacing: 2px; }
            .date-tag { font-size: 1.5rem; padding: 0.6rem 1.2rem; }
            .fun-message { font-size: 1.8rem; }
            .dyn-btn { font-size: 1.6rem; padding: 1rem 2rem; }
        }
    </style>
</head>
<body id="mainBody">

<div class="dynamic-card" id="dynamicCard">
    
    <!-- 超大群友问候：点名树莓派小驴车群 🎉 -->
    <div class="greeting">
        <h1>
            树莓派小驴车群<br>
            <span>🚌 群友门大家好 🚐</span>
        </h1>
        <span class="live-badge">🐴 动态小驴 · 在线撒花</span>
    </div>

    <!-- 动态时间 (每秒更新) 大字显示 -->
    <div class="time-panel">
        <div class="time-place">
            <span class="clock-icon">⏰</span>
            <span class="digital" id="liveClock">--:--:--</span>
        </div>
        <div class="date-tag" id="liveDate">----年--月--日</div>
    </div>

    <!-- 鼠标移动动态区域 (坐标+趣味信息) 大大方方 -->
    <div class="surprise-zone" id="mouseZone">
        <p>
            <span>🖐️ 群友，移动鼠标呀</span>
            <span class="mouse-coord" id="coordDisplay">x: 0, y: 0</span>
        </p>
        <div class="fun-message" id="dynamicMessage">
            🎠 小驴车飘过~
        </div>
    </div>

    <!-- 超大按钮，群友随便点 -->
    <div class="toolbar">
        <button class="dyn-btn" id="colorToggleBtn">
            <span class="color-dot"></span> 🎨 换肤·小驴变色
        </button>
        <button class="dyn-btn" id="resetMsgBtn">
            ✨ 重置·回到快乐老家
        </button>
    </div>

    <footer>
        🚜 每一次互动 · 都是树莓派小驴车的回应
    </footer>
</div>

<script>
    (function() {
        // 获取元素
        const clockEl = document.getElementById('liveClock');
        const dateEl = document.getElementById('liveDate');
        const coordEl = document.getElementById('coordDisplay');
        const msgEl = document.getElementById('dynamicMessage');
        const mouseZone = document.getElementById('mouseZone');
        const colorBtn = document.getElementById('colorToggleBtn');
        const resetBtn = document.getElementById('resetMsgBtn');
        const body = document.getElementById('mainBody');
        const card = document.getElementById('dynamicCard');

        // ========== 1. 实时时钟 (动态秒更新) 大字跳动 ==========
        function updateDateTime() {
            const now = new Date();
            
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            clockEl.textContent = `${hours}:${minutes}:${seconds}`;
            
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const weekday = weekdays[now.getDay()];
            dateEl.textContent = `${year}年${month}月${day}日 ${weekday}`;
        }
        updateDateTime();
        setInterval(updateDateTime, 1000);

        // ========== 2. 鼠标移动动态 —— 给群友大彩蛋 ==========
        const messages = [
            "🐴 小驴车加速咯",
            "🌿 树莓派飘香",
            "🔧 群友在调试",
            "🚲 骑上小驴车",
            "🍓 树莓熟了",
            "🎠 旋转木驴",
            "⚡ 动态电路接通",
            "🧰 群友工具包",
            "🔋 电量100%",
            "🧃 派派喝果汁"
        ];

        let lastMsgIndex = -1;

        function handleMouseMove(e) {
            const rect = mouseZone.getBoundingClientRect();
            const x = Math.round(e.clientX - rect.left);
            const y = Math.round(e.clientY - rect.top);
            
            coordEl.textContent = `x: ${x}, y: ${y}`;

            // 30%概率换句子，保持活泼
            if (Math.random() < 0.3) {
                let randomIndex = Math.floor(Math.random() * messages.length);
                while (randomIndex === lastMsgIndex && messages.length > 1) {
                    randomIndex = Math.floor(Math.random() * messages.length);
                }
                msgEl.textContent = messages[randomIndex];
                lastMsgIndex = randomIndex;
            }

            // 根据坐标微调区域背景 (hue变化) 让视觉更动态
            const hue = (x * 0.5 + y * 0.3) % 360;
            mouseZone.style.backgroundColor = `hsla(${hue}, 50%, 80%, 0.7)`;
        }

        let ticking = false;
        mouseZone.addEventListener('mousemove', (e) => {
            if (!ticking) {
                window.requestAnimationFrame(() => {
                    handleMouseMove(e);
                    ticking = false;
                });
                ticking = true;
            }
        });

        mouseZone.addEventListener('mouseleave', () => {
            msgEl.textContent = '👋 小驴车溜走了… 快回来';
            mouseZone.style.backgroundColor = ''; 
            coordEl.textContent = 'x: --, y: --';
        });

        mouseZone.addEventListener('mouseenter', () => {
            msgEl.textContent = '🚎 小驴车进站啦';
        });

        // ========== 3. 换肤按钮：背景/卡片色切换 大字群友乐 ==========
        function getRandomPastel() {
            const hue = Math.floor(Math.random() * 360);
            return `hsl(${hue}, 45%, 80%)`;   // 更鲜艳一点
        }

        colorBtn.addEventListener('click', () => {
            const col1 = getRandomPastel();
            const col2 = getRandomPastel();
            body.style.background = `linear-gradient(145deg, ${col1}, ${col2})`;
            
            // 内层光晕也换
            card.style.boxShadow = `0 40px 70px rgba(0, 0, 0, 0.4), 0 0 0 4px ${col2} inset, 0 15px 30px -10px black`;
            
            msgEl.textContent = '🌈 小驴换新衣啦';
            lastMsgIndex = -1;
        });

        // ========== 4. 重置按钮：恢复最初风格 ==========
        resetBtn.addEventListener('click', () => {
            // 恢复初始背景 (暗绿色调)
            body.style.background = 'linear-gradient(145deg, #3a4e5e 0%, #1e3a4a 100%)';
            card.style.boxShadow = '0 40px 70px rgba(0, 0, 0, 0.4), 0 0 0 2px #ffefc0 inset, 0 15px 30px -10px #00000060';
            
            msgEl.textContent = '🎠 小驴车飘过~';
            mouseZone.style.backgroundColor = '';
            coordEl.textContent = 'x: 0, y: 0';
            lastMsgIndex = -1;
        });

        console.log('🚜 树莓派小驴车群 · 大字动态版 启动！');
    })();
</script>
</body>
</html>
