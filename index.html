<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>GitHub CSV 收集器</title>
    <style>
        body { font-family: system-ui; max-width: 800px; margin: 50px auto; padding: 20px; }
        .warning { background: #fff3cd; border-left: 4px solid #ffc107; padding: 15px; margin: 20px 0; }
        .success { background: #d4edda; border-left: 4px solid #28a745; padding: 15px; margin: 20px 0; }
        .error { background: #f8d7da; border-left: 4px solid #dc3545; padding: 15px; margin: 20px 0; }
        input, button { padding: 10px; margin: 5px; border-radius: 5px; }
        button { background: #1d86b1; color: white; border: none; cursor: pointer; }
        button:hover { background: #156a8f; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f2f2f2; }
    </style>
</head>
<body>
    <h1>📁 GitHub CSV 存储</h1>
    
    <div class="warning">
        <strong>⚠️ 安全提醒：</strong> 请使用新生成的 token，不要分享给别人。格式应为 <code>ghp_xxxxxxxxxxxx</code>
    </div>
    
    <div style="background: #f5f5f5; padding: 20px; border-radius: 10px;">
        <h3>🔑 GitHub 配置</h3>
        <input type="password" id="token" placeholder="GitHub Token (ghp_...)" style="width: 300px">
        <input type="text" id="owner" placeholder="仓库所有者" value="your-username">
        <input type="text" id="repo" placeholder="仓库名称" value="your-repo">
        <input type="text" id="branch" placeholder="分支" value="main">
    </div>
    
    <div style="margin: 20px 0;">
        <h3>📝 添加数据</h3>
        <input type="text" id="name" placeholder="姓名">
        <input type="number" id="age" placeholder="年龄">
        <input type="email" id="email" placeholder="邮箱">
        <button onclick="addAndSave()">保存到 GitHub</button>
        <button onclick="loadFromGitHub()" style="background: #6c757d;">从 GitHub 加载</button>
    </div>
    
    <div id="status"></div>
    
    <h3>📊 当前数据</h3>
    <table id="dataTable">
        <thead>
            <tr><th>姓名</th><th>年龄</th><th>邮箱</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
    
    <script>
    let records = [];
    
    async function saveToGitHub() {
        const token = document.getElementById('token').value;
        const owner = document.getElementById('owner').value;
        const repo = document.getElementById('repo').value;
        const branch = document.getElementById('branch').value;
        
        if (!token || !owner || !repo) {
            showStatus('请填写所有 GitHub 配置', 'error');
            return false;
        }
        
        // 验证 token 格式
        if (!token.startsWith('ghp_') && !token.startsWith('github_pat_')) {
            showStatus('Token 格式不正确，应该以 ghp_ 或 github_pat_ 开头', 'error');
            return false;
        }
        
        showStatus('正在保存到 GitHub...', 'warning');
        
        try {
            // 生成 CSV
            const csv = generateCSV(records);
            const content = btoa(unescape(encodeURIComponent(csv)));
            
            // 获取当前文件信息
            const fileUrl = `https://api.github.com/repos/${owner}/${repo}/contents/data.csv?ref=${branch}`;
            let sha = null;
            
            try {
                const getRes = await fetch(fileUrl, {
                    headers: { 'Authorization': `token ${token}` }
                });
                if (getRes.ok) {
                    const fileData = await getRes.json();
                    sha = fileData.sha;
                }
            } catch (e) {}
            
            // 上传文件
            const uploadData = {
                message: `更新数据 (${new Date().toLocaleString()})`,
                content: content,
                branch: branch
            };
            if (sha) uploadData.sha = sha;
            
            const putRes = await fetch(fileUrl, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(uploadData)
            });
            
            if (!putRes.ok) {
                const err = await putRes.json();
                throw new Error(err.message);
            }
            
            showStatus('✅ 成功保存到 GitHub！', 'success');
            return true;
            
        } catch (error) {
            showStatus(`❌ 保存失败: ${error.message}`, 'error');
            console.error(error);
            return false;
        }
    }
    
    async function loadFromGitHub() {
        const token = document.getElementById('token').value;
        const owner = document.getElementById('owner').value;
        const repo = document.getElementById('repo').value;
        const branch = document.getElementById('branch').value;
        
        try {
            showStatus('正在从 GitHub 加载...', 'warning');
            
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/data.csv?ref=${branch}`;
            const res = await fetch(url, {
                headers: { 'Authorization': `token ${token}` }
            });
            
            if (!res.ok) {
                if (res.status === 404) {
                    records = [];
                    updateTable();
                    showStatus('文件不存在，将创建新文件', 'warning');
                    return;
                }
                throw new Error(`HTTP ${res.status}`);
            }
            
            const data = await res.json();
            const content = decodeURIComponent(escape(atob(data.content)));
            
            // 解析 CSV
            records = parseCSV(content);
            updateTable();
            showStatus(`✅ 成功加载 ${records.length} 条记录`, 'success');
            
        } catch (error) {
            showStatus(`❌ 加载失败: ${error.message}`, 'error');
        }
    }
    
    function generateCSV(records) {
        let csv = '姓名,年龄,邮箱\n';
        records.forEach(r => {
            csv += `"${r.name || ''}","${r.age || ''}","${r.email || ''}"\n`;
        });
        return csv;
    }
    
    function parseCSV(csv) {
        const lines = csv.split('\n').filter(l => l.trim());
        if (lines.length <= 1) return [];
        
        const records = [];
        for (let i = 1; i < lines.length; i++) {
            const fields = lines[i].split(',').map(f => 
                f.replace(/^"|"$/g, '').trim()
            );
            if (fields.length >= 3) {
                records.push({
                    name: fields[0],
                    age: fields[1],
                    email: fields[2]
                });
            }
        }
        return records;
    }
    
    function addAndSave() {
        const name = document.getElementById('name').value.trim();
        const age = document.getElementById('age').value.trim();
        const email = document.getElementById('email').value.trim();
        
        if (!name || !age || !email) {
            showStatus('请填写完整信息', 'error');
            return;
        }
        
        records.push({ name, age, email });
        updateTable();
        
        // 清空输入
        document.getElementById('name').value = '';
        document.getElementById('age').value = '';
        document.getElementById('email').value = '';
        
        // 自动保存到 GitHub
        saveToGitHub();
    }
    
    function updateTable() {
        const tbody = document.getElementById('tableBody');
        if (records.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" style="text-align: center;">暂无数据</td></tr>';
            return;
        }
        
        let html = '';
        records.forEach(r => {
            html += `<tr><td>${r.name}</td><td>${r.age}</td><td>${r.email}</td></tr>`;
        });
        tbody.innerHTML = html;
    }
    
    function showStatus(msg, type) {
        const div = document.getElementById('status');
        div.className = type;
        div.innerHTML = msg;
        setTimeout(() => div.innerHTML = '', 5000);
    }
    </script>
</body>
</html>
